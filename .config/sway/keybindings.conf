# === LAUNCH ===

# App launcher
bindsym $mod+p exec $menu

# Terminal
bindsym $mod+Return exec $term

# Browser (Firefox)
bindsym $mod+b exec chrome

# Browser (Firefox private)
bindsym $mod+Shift+b exec chrome --private-window

# Show keybindings help
bindsym $mod+F1 exec $config_dir/scripts/help

# Clipboard history
bindsym $mod+c exec cliphist list | fuzzel --dmenu | cliphist decode | wl-copy

# Theme switcher
bindsym $mod+Shift+t exec $config_dir/scripts/thememenu

# File manager (Thunar)
# bindsym $mod+e exec thunar
bindsym $mod+e exec $config_dir/scripts/thunar-scratchpad
#bindsym $mod+e exec swaymsg -t get_tree | grep -q '"app_id": "thunar"' && (swaymsg "[app_id=thunar] scratchpad show") || (thunar & sleep 0.25 && swaymsg "[app_id=thunar] move scratchpad, scratchpad show")
#bindsym $mod+e exec swaymsg "[app_id=thunar] scratchpad show" || (thunar & sleep 0.25 && swaymsg "[app_id=thunar] move scratchpad, scratchpad show")
# bindsym $mod+e exec swaymsg "[app_id=thunar] scratchpad show" || (thunar & sleep 0.25 && swaymsg "[app_id=thunar] move scratchpad, scratchpad show")
# bindsym $mod+e exec swaymsg -t get_tree | grep -q '"app_id": "thunar"' && (swaymsg "[app_id=thunar] scratchpad show") || (thunar --id=thunar-scratchpad & sleep 0.25 && swaymsg "[app_id=thunar] move scratchpad, scratchpad show")



# Calculator
bindsym Scroll_Lock exec galculator

# GIMP
bindsym $mod+g exec gimp

# === WINDOW STATE ===

# Toggle floating
bindsym $mod+Shift+space floating toggle

# Toggle fullscreen
bindsym $mod+Shift+f fullscreen

# Cycle layout (split → tabbed → stacking)
bindsym $mod+t layout toggle split tabbed stacking

# Tabbed layout
bindsym $mod+w layout tabbed

# Cycle through tabs / siblings in current container
bindsym $mod+Tab focus next sibling
# Cycle through tabs (previous)
bindsym $mod+Shift+Tab focus prev sibling

# Toggle floating / focus tiled-floating
bindsym Mod4+Space focus mode_toggle, floating toggle

# === WM CONTROL ===

# Reload sway
bindsym $mod+Shift+r reload

# Exit sway
bindsym $mod+Shift+q exit

# Close window
bindsym $mod+q kill

# Power menu (shutdown/reboot)
bindsym $mod+Shift+Return exec $config_dir/scripts/power

# Toggle notification center (swaync)
bindsym $mod+Shift+n exec swaync-client -t

# === WINDOW NAVIGATION ===

bindsym $mod+Left focus left
bindsym $mod+Down focus down
bindsym $mod+Up focus up
bindsym $mod+Right focus right

bindsym $mod+$left focus left
bindsym $mod+$down focus down
bindsym $mod+$up focus up
bindsym $mod+$right focus right

# Move focused window
bindsym $mod+Shift+Left move left
bindsym $mod+Shift+Down move down
bindsym $mod+Shift+Up move up
bindsym $mod+Shift+Right move right

bindsym $mod+Shift+$left move left
bindsym $mod+Shift+$down move down
bindsym $mod+Shift+$up move up
bindsym $mod+Shift+$right move right

# === WINDOW RESIZE ===

bindsym $mod+Ctrl+Left resize shrink width 10px
bindsym $mod+Ctrl+Right resize grow width 10px
bindsym $mod+Ctrl+Up resize shrink height 10px
bindsym $mod+Ctrl+Down resize grow height 10px

bindsym $mod+Ctrl+$left resize shrink width 10px
bindsym $mod+Ctrl+$right resize grow width 10px
bindsym $mod+Ctrl+$up resize shrink height 10px
bindsym $mod+Ctrl+$down resize grow height 10px

# Balance windows
bindsym $mod+Ctrl+equal balance

# === MEDIA & BRIGHTNESS ===

bindsym XF86AudioRaiseVolume exec $config_dir/scripts/changevolume up
bindsym XF86AudioLowerVolume exec $config_dir/scripts/changevolume down
bindsym XF86AudioMute exec $config_dir/scripts/changevolume mute

# Volume control (custom bindings)
bindsym $mod+F12 exec $config_dir/scripts/changevolume up
bindsym $mod+F11 exec $config_dir/scripts/changevolume down
bindsym $mod+F10 exec $config_dir/scripts/changevolume mute

# brightnessctl not applicable on desktop with HDMI monitor
# bindsym XF86MonBrightnessUp exec brightnessctl set +5%
# bindsym XF86MonBrightnessDown exec brightnessctl set 5%-

# === SCREENSHOTS ===

# Region screenshot
bindsym Print exec $config_dir/scripts/screenshot region

# Window screenshot
bindsym $mod+Print exec $config_dir/scripts/screenshot window

# Fullscreen screenshot
bindsym $mod+Shift+Print exec $config_dir/scripts/screenshot full
