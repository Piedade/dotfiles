#!/bin/bash
# === LAUNCH ===

bindsym $mod+m exec swaymsg "output * dpms on"

# App launcher
bindsym $mod+p exec $menu

# Terminal
bindsym $mod+Return exec $term

# Browser (Firefox)
bindsym $mod+b exec chrome

# Browser (Firefox private)
bindsym $mod+Shift+b exec chrome --private-window

# Show keybindings help
bindsym $mod+F1 exec $config_dir/scripts/help

# Clipboard history
bindsym $mod+c exec cliphist list | fuzzel --dmenu | cliphist decode | wl-copy

# Layout menu
bindsym $mod+Shift+t exec $config_dir/scripts/sway-layout-menu.sh

# File manager (Thunar)
bindsym $mod+e exec $config_dir/scripts/thunar-scratchpad

# Calculator
bindsym Scroll_Lock exec galculator

# GIMP
bindsym $mod+g exec gimp

# === WINDOW STATE ===

# Toggle floating
bindsym $mod+Shift+space floating toggle

# Toggle fullscreen
bindsym $mod+f fullscreen

# Cycle layout (split → tabbed → stacking)
bindsym $mod+t layout toggle split tabbed stacking

# Tabbed layout
# bindsym $mod+w layout tabbed

# Cycle through tabs / siblings in current container
bindsym Mod1+Tab focus next sibling
# Cycle through tabs (previous)
bindsym Mod1+Shift+Tab focus prev sibling

# Toggle floating / focus tiled-floating
bindsym $mod+Space focus mode_toggle, floating toggle

# === WM CONTROL ===

# Reload sway
bindsym $mod+Shift+r reload

# Exit sway
bindsym $mod+Shift+q exit

# Close window
bindsym $mod+q kill

# Power menu (shutdown/reboot)
bindsym $mod+Shift+Return exec $config_dir/scripts/power

# Toggle notification center (swaync)
bindsym $mod+Shift+n exec swaync-client -t

# === WINDOW NAVIGATION ===

bindsym $mod+Left focus left
bindsym $mod+Down focus down
bindsym $mod+Up focus up
bindsym $mod+Right focus right

bindsym $mod+$left focus left
bindsym $mod+$down focus down
bindsym $mod+$up focus up
bindsym $mod+$right focus right

# Move focused window
bindsym $mod+Shift+Left move left
bindsym $mod+Shift+Down move down
bindsym $mod+Shift+Up move up
bindsym $mod+Shift+Right move right

bindsym $mod+Shift+$left move left
bindsym $mod+Shift+$down move down
bindsym $mod+Shift+$up move up
bindsym $mod+Shift+$right move right

# === WINDOW RESIZE ===

bindsym $mod+Ctrl+Left resize shrink width 10px
bindsym $mod+Ctrl+Right resize grow width 10px
bindsym $mod+Ctrl+Up resize shrink height 10px
bindsym $mod+Ctrl+Down resize grow height 10px

bindsym $mod+Ctrl+$left resize shrink width 10px
bindsym $mod+Ctrl+$right resize grow width 10px
bindsym $mod+Ctrl+$up resize shrink height 10px
bindsym $mod+Ctrl+$down resize grow height 10px

# Balance windows
bindsym $mod+Ctrl+equal balance

# === MEDIA & BRIGHTNESS ===

# Volume control
bindsym --locked XF86AudioRaiseVolume exec $config_dir/scripts/changevolume up
bindsym --locked XF86AudioLowerVolume exec $config_dir/scripts/changevolume down
bindsym --locked XF86AudioMute exec $config_dir/scripts/changevolume mute
bindsym --locked XF86AudioMicMute exec $config_dir/scripts/changevolume micmute
# bindsym $mod+F12 exec $config_dir/scripts/changevolume up
# bindsym $mod+F11 exec $config_dir/scripts/changevolume down
# bindsym $mod+F10 exec $config_dir/scripts/changevolume mute

# Special keys to control media via playerctl
bindsym --locked XF86AudioPlay exec playerctl play-pause
bindsym --locked XF86AudioPause exec playerctl play-pause
bindsym --locked XF86AudioPrev exec playerctl previous
bindsym --locked XF86AudioNext exec playerctl next
bindsym --locked XF86AudioStop exec playerctl stop

# brightnessctl not applicable on desktop with HDMI monitor
# bindsym XF86MonBrightnessUp exec brightnessctl set +5%
# bindsym XF86MonBrightnessDown exec brightnessctl set 5%-

# === SCREENSHOTS ===

# Region screenshot
bindsym Print exec $config_dir/scripts/screenshot region

# Window screenshot
bindsym $mod+Print exec $config_dir/scripts/screenshot window

# Fullscreen screenshot
bindsym $mod+Shift+Print exec $config_dir/scripts/screenshot full

# === WORKSPACES ===

# Workspace vars
set $ws1 number 1
set $ws2 number 2
set $ws3 number 3
set $ws4 number 4
set $ws5 number 5
set $ws6 number 6
set $ws7 number 7
set $ws8 number 8
set $ws9 number 9
set $ws10 number 10
set $ws11 number 11
set $ws12 number 12

# Switch to workspace
bindsym $mod+1 workspace $ws1
bindsym $mod+2 workspace $ws2
bindsym $mod+3 workspace $ws3
bindsym $mod+4 workspace $ws4
bindsym $mod+5 workspace $ws5
bindsym $mod+6 workspace $ws6
bindsym $mod+7 workspace $ws7
bindsym $mod+8 workspace $ws8
bindsym $mod+9 workspace $ws9
bindsym $mod+0 workspace $ws10
bindsym $mod+minus workspace $ws11
bindsym $mod+equal workspace $ws12

# Move focused window to workspace
bindsym $mod+Shift+1 move container to workspace $ws1
bindsym $mod+Shift+2 move container to workspace $ws2
bindsym $mod+Shift+3 move container to workspace $ws3
bindsym $mod+Shift+4 move container to workspace $ws4
bindsym $mod+Shift+5 move container to workspace $ws5
bindsym $mod+Shift+6 move container to workspace $ws6
bindsym $mod+Shift+7 move container to workspace $ws7
bindsym $mod+Shift+8 move container to workspace $ws8
bindsym $mod+Shift+9 move container to workspace $ws9
bindsym $mod+Shift+0 move container to workspace $ws10
bindsym $mod+Shift+minus move container to workspace $ws11
bindsym $mod+Shift+equal move container to workspace $ws12

# Alterna entre o workspace atual e o último ativo
bindsym $mod+Tab workspace back_and_forth

# #
# # Scratchpad:
