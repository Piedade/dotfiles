# for_window [app_id="thunar" title="Create *"] floating enable, move position center
# for_window [app_id="thunar" title="Error *"] floating enable, move position center
# for_window [app_id="thunar" title="Question *"] floating enable, move position center
# for_window [app_id="thunar" title="Warning *"] floating enable, move position center

# Inhibit idle for fullscreen apps
for_window [app_id=".*"] inhibit_idle fullscreen

# Android Studio
for_window [app_id="jetbrains-studio" title=".* Wizard"] floating enable, move position center
for_window [app_id="jetbrains-studio" title="Welcome .*"] floating enable, move position center
for_window [app_id="jetbrains-studio" title="New Project"] floating enable
