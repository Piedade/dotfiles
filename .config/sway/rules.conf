# App workspace assignments
# Workspace 1
assign [app_id="code"] $ws1

# Workspace 2
assign [app_id="google-chrome"] $ws2

# Workspace 3
assign [app_id="Alacritty"] $ws3

# Workspace 4
assign [app_id="gimp"] $ws4
assign [app_id="org.inkscape.Inkscape"] $ws4

# Workspace 5
assign [class="libreoffice.*"] $ws5
assign [app_id="thunderbird"] $ws5
assign [app_id="anydesk"] $ws5

# Workspace 6

# Workspace 7
assign [app_id="obsidian"] $ws7
assign [app_id="beekeeper-studio"] $ws7
assign [app_id="bruno"] $ws7

# Workspace 8
assign [app_id="jetbrains-studio"] $ws8

# Workspace 9



# Float commonly-floating apps
for_window [app_id="mpv"] floating enable, move position center
for_window [app_id="eog"] floating enable, move position center
for_window [app_id="galculator"] floating enable, resize set 200 400, move position 75 ppt 50 ppt
for_window [app_id="transmission-gtk"] floating enable, move position center
for_window [app_id="nwg-look"] floating enable, move position center
for_window [app_id="pavucontrol"] floating enable, move position center
for_window [app_id="blueman-manager"] floating enable, move position center
for_window [app_id="satty"] floating enable, move position center

for_window [app_id="thunar"] floating enable, move position center
# # Thunar - float dialogs (progress, confirmations, properties, etc.)
